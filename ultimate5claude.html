<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUDR Tvůrce — NLI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}

/* ═══ THEMES ═══ */
body.light {
  --bg:#eaf2e6; --surface:#ffffff; --surface2:#f0f7ec; --surface3:#e4f0de;
  --border:#b8d4ae; --border2:#8cb882; --border3:#d0e8c8;
  --accent:#2a7a38; --accent2:#1e5c2a; --accent-glow:rgba(42,122,56,0.12);
  --red:#c0392b; --gold:#b8720a; --pine:#0d4a1a;
  --text:#17301e; --text-dim:#5e8060; --text-mid:#336040;
  --json-bg:#f4fdf0; --json-color:#1a5028;
  --nhead:#f6fcf3; --canvas-dot:rgba(100,160,100,0.35);
  --shadow:rgba(0,80,20,0.08); --shadow-deep:rgba(0,60,15,0.18);
  --input-bg:#ffffff; --select-bg:#ffffff;
  --node-start-border:rgba(184,114,10,0.7); --node-start-head:rgba(184,114,10,0.05);
  --node-term-border:rgba(42,122,56,0.6);  --node-term-head:rgba(42,122,56,0.05);
  --scroll-thumb:#b8d4ae;
}
body.dark {
  --bg:#050e06; --surface:#0d1a0d; --surface2:#122014; --surface3:#182818;
  --border:#1c3820; --border2:#2a5030; --border3:#162a18;
  --accent:#48bb68; --accent2:#35924e; --accent-glow:rgba(72,187,104,0.14);
  --red:#ff5f7e; --gold:#ffd166; --pine:#a0e8b0;
  --text:#bdddb5; --text-dim:#3c6840; --text-mid:#65985a;
  --json-bg:#040c05; --json-color:#72c888;
  --nhead:#0a180a; --canvas-dot:rgba(22,50,26,0.95);
  --shadow:rgba(0,0,0,0.4); --shadow-deep:rgba(0,0,0,0.7);
  --input-bg:#0d1a0d; --select-bg:#0d1a0d;
  --node-start-border:rgba(255,209,102,0.45); --node-start-head:rgba(255,209,102,0.04);
  --node-term-border:rgba(72,187,104,0.5);    --node-term-head:rgba(72,187,104,0.04);
  --scroll-thumb:#2a5030;
}

:root{--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;--node-w:220px;--r:10px;}

body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;transition:background 0.25s,color 0.25s;}

/* ═══ SCROLLBARS ═══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}

/* ═══ HEADER ═══ */
header{height:52px;background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:100;transition:background 0.25s,border-color 0.25s;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-icon{width:30px;height:30px;flex-shrink:0;}
.logo-text{display:flex;flex-direction:column;line-height:1.15;}
.logo-name{font-weight:800;font-size:1rem;letter-spacing:-0.02em;color:var(--accent);}
.logo-sub{font-size:0.62rem;color:var(--text-dim);font-weight:400;font-family:var(--mono);}
.h-sep{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0;}
.h-spacer{flex:1}
.hbtn{padding:6px 13px;border-radius:7px;font-family:var(--mono);font-size:0.73rem;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-mid);transition:all 0.15s;white-space:nowrap;flex-shrink:0;line-height:1;}
.hbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.hbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.hbtn.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.hbtn.grn{color:var(--accent);border-color:var(--border2);}
.hbtn.grn:hover{background:var(--accent-glow);border-color:var(--accent);}
.hbtn.amber{color:var(--gold);border-color:var(--border);}
.hbtn.amber:hover{background:rgba(184,114,10,0.1);border-color:var(--gold);}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.95rem;transition:all 0.15s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.icon-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}

/* ═══ MAIN LAYOUT ═══ */
main{flex:1;display:flex;overflow:hidden;}

/* ═══ CANVAS ═══ */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);background-image:radial-gradient(circle,var(--canvas-dot) 1px,transparent 1px);background-size:26px 26px;transition:background 0.25s;}
#canvas-transform{position:absolute;top:0;left:0;width:7000px;height:7000px;transform-origin:0 0;}
#svg-layer{position:absolute;top:0;left:0;width:7000px;height:7000px;pointer-events:none;overflow:visible;}

/* ═══ RESIZER ═══ */
#resizer{width:5px;flex-shrink:0;cursor:col-resize;background:var(--border);position:relative;transition:background 0.15s;}
#resizer:hover,#resizer.dragging{background:var(--accent);}
#resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:32px;background:currentColor;border-radius:1px;opacity:0.4;}

/* ═══ RIGHT PANEL ═══ */
#right-panel{width:400px;min-width:260px;max-width:720px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);transition:background 0.25s;}
.tabs{display:flex;border-bottom:1.5px solid var(--border);flex-shrink:0;overflow-x:auto;transition:border-color 0.25s;}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:12px 13px;font-family:var(--mono);font-size:0.7rem;cursor:pointer;color:var(--text-dim);border-bottom:2.5px solid transparent;transition:all 0.15s;white-space:nowrap;flex-shrink:0;letter-spacing:0.02em;}
.tab:hover:not(.active){color:var(--text-mid);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.pane{display:none;flex:1;overflow:hidden;flex-direction:column;}
.pane.active{display:flex;}

/* ═══ NODES ═══ */
.node{position:absolute;width:var(--node-w);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);cursor:grab;box-shadow:0 3px 16px var(--shadow);transition:border-color 0.12s,box-shadow 0.12s;}
.node:hover{border-color:var(--border2);}
.node.selected{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-glow),0 6px 24px var(--shadow-deep);}
.node.nstart{border-color:var(--node-start-border);}
.node.nstart .nhead{background:var(--node-start-head);}
.node.nterm{border-color:var(--node-term-border);}
.node.nterm .nhead{background:var(--node-term-head);}
.nhead{padding:10px 10px 8px;border-bottom:1px solid var(--border);border-radius:calc(var(--r)-1.5px) calc(var(--r)-1.5px) 0 0;background:var(--nhead);transition:background 0.25s;}
.nbadge{font-family:var(--mono);font-size:0.6rem;color:var(--text-dim);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nstart .nbadge{color:var(--gold);opacity:.85;}
.nterm  .nbadge{color:var(--accent);opacity:.85;}
.ntitle{font-size:0.82rem;font-weight:600;line-height:1.35;word-break:break-word;}
.ntitle.empty{color:var(--text-dim);font-weight:400;font-style:italic;}
.nbody{padding:8px 8px 6px;}
.nans{display:flex;align-items:center;margin-bottom:4px;}
.npill{flex:1;padding:3px 8px;border-radius:4px;font-family:var(--mono);font-size:0.62rem;border:1px solid;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;}
.nadd{font-family:var(--mono);font-size:0.62rem;color:var(--text-dim);cursor:pointer;padding:3px 2px;border-radius:3px;transition:color 0.12s;}
.nadd:hover{color:var(--accent);}

/* ═══ NODE EDITOR ═══ */
#ned{flex:1;overflow-y:auto;padding:15px;user-select:text;-webkit-user-select:text;}
.neempty{color:var(--text-dim);font-family:var(--mono);font-size:0.78rem;text-align:center;padding:60px 20px;line-height:2.4;}
.neempty big{display:block;font-size:2.2rem;margin-bottom:6px;}
.neg{margin-bottom:13px;}
.nelabel{font-family:var(--mono);font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.ltok{color:var(--accent);background:var(--accent-glow);border:1px solid var(--accent-glow);border-radius:3px;padding:1px 5px;font-size:0.58rem;}
.neinput,.neselect,.netarea{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-family:var(--mono);font-size:0.82rem;color:var(--text);outline:none;transition:border-color 0.12s;}
.neinput:focus,.neselect:focus,.netarea:focus{border-color:var(--accent);}
.neinput[readonly]{color:var(--text-dim);cursor:default;background:var(--surface2);}
.neselect{cursor:pointer;background:var(--select-bg);}
.netarea{resize:vertical;min-height:52px;line-height:1.6;}
.nesec{display:flex;align-items:center;margin:16px 0 10px;font-family:var(--mono);font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;gap:8px;}
.nesec-line{flex:1;height:1px;background:var(--border);}
.acard{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px;margin-bottom:8px;}
.acard-top{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.adel{width:24px;height:24px;border-radius:5px;border:1.5px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;font-size:1rem;flex-shrink:0;transition:all 0.12s;display:flex;align-items:center;justify-content:center;}
.adel:hover{border-color:var(--red);color:var(--red);background:rgba(192,57,43,0.1);}
.addansbtn{width:100%;padding:8px;background:transparent;border:1.5px dashed var(--border2);border-radius:7px;color:var(--text-dim);font-family:var(--mono);font-size:0.73rem;cursor:pointer;transition:all 0.12s;margin-bottom:11px;}
.addansbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.delnodebtn{width:100%;padding:8px;background:rgba(192,57,43,0.05);border:1.5px solid rgba(192,57,43,0.2);border-radius:7px;color:var(--red);font-family:var(--mono);font-size:0.73rem;cursor:pointer;transition:all 0.12s;margin-top:14px;}
.delnodebtn:hover{background:rgba(192,57,43,0.12);border-color:var(--red);}

/* ═══ JSON TAB ═══ */
#json-area{flex:1;background:var(--json-bg);border:none;resize:none;font-family:var(--mono);font-size:0.78rem;line-height:1.7;color:var(--json-color);padding:14px 16px;outline:none;user-select:text;-webkit-user-select:text;transition:background 0.25s,color 0.25s;}
#json-area.err{color:var(--red)!important;}
.pfooter{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;background:var(--surface);transition:background 0.25s,border-color 0.25s;}

/* ═══ PREVIEW ═══ */
#preview-frame{flex:1;border:none;background:#000;}

/* ═══ TEMPLATE TAB ═══ */
#tpl-ed{flex:1;overflow-y:auto;padding:15px;user-select:text;-webkit-user-select:text;}
.tsec{margin-bottom:20px;}
.tsec-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-family:var(--mono);font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;}
.tsec-line{flex:1;height:1px;background:var(--border);}
.tsec-add{padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:0.65rem;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text-dim);transition:all 0.12s;flex-shrink:0;}
.tsec-add:hover{border-color:var(--accent);color:var(--accent);}
.tsec-desc{font-family:var(--mono);font-size:0.65rem;color:var(--text-dim);margin-bottom:9px;line-height:1.7;}
.tvar-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.tvar-key{width:94px;flex-shrink:0;}
.tvar-lbl{width:82px;flex-shrink:0;}
.tvar-row input[type=text],.tvar-row input[type=color]{background:var(--input-bg);border:1.5px solid var(--border);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:0.68rem;color:var(--text);outline:none;transition:border-color 0.12s;}
.tvar-row input[type=text]:focus{border-color:var(--accent);}
.tvar-row input[type=color]{width:28px;height:28px;padding:2px;cursor:pointer;flex-shrink:0;}
.tvar-val-in{flex:1;min-width:0;}
.tvar-del,.tfield-del{width:22px;height:22px;border-radius:4px;border:1.5px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s;}
.tvar-del:hover,.tfield-del:hover{border-color:var(--red);color:var(--red);background:rgba(192,57,43,0.1);}
.tfield-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.tfield-id{width:100px;flex-shrink:0;color:var(--accent)!important;}
.tfield-row input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:0.72rem;color:var(--text);outline:none;transition:border-color 0.12s;flex:1;min-width:0;}
.tfield-row input:focus{border-color:var(--accent);}
.tokens{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tok{font-family:var(--mono);font-size:0.63rem;color:var(--accent);background:var(--accent-glow);border:1px solid rgba(42,122,56,0.2);border-radius:4px;padding:2px 7px;cursor:pointer;user-select:all;-webkit-user-select:all;transition:background 0.12s;}
body.dark .tok{border-color:rgba(72,187,104,0.2);}
.tok:hover{background:rgba(42,122,56,0.2);}
body.dark .tok:hover{background:rgba(72,187,104,0.2);}
.tok.gold{color:var(--gold);background:rgba(184,114,10,0.08);border-color:rgba(184,114,10,0.2);}
.ttpl{width:100%;min-height:90px;background:var(--json-bg);border:1.5px solid var(--border);border-radius:6px;padding:9px 10px;font-family:var(--mono);font-size:0.72rem;color:var(--json-color);outline:none;resize:vertical;line-height:1.65;transition:border-color 0.12s;}
.ttpl:focus{border-color:var(--accent);}

/* ═══ CANVAS TOOLBAR ═══ */
#ctb{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--border);border-radius:40px;padding:7px 14px;display:flex;gap:5px;align-items:center;box-shadow:0 8px 40px var(--shadow-deep);z-index:50;transition:background 0.25s,border-color 0.25s;}
.ctbsep{width:1px;height:18px;background:var(--border);margin:0 3px;}
.ctbbtn{padding:6px 11px;border-radius:20px;font-family:var(--mono);font-size:0.68rem;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-mid);transition:all 0.12s;}
.ctbbtn:hover{background:var(--surface2);border-color:var(--border);color:var(--text);}
.ctbbtn.ac{background:var(--accent);color:#fff;border-color:var(--accent);}
.ctbbtn.ac:hover{background:var(--accent2);}
.zoomlbl{font-family:var(--mono);font-size:0.64rem;color:var(--text-dim);min-width:40px;text-align:center;}

/* ═══ NOTIF ═══ */
#notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface);border:1.5px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:0.73rem;padding:8px 16px;border-radius:8px;opacity:0;transition:all 0.22s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px var(--shadow-deep);}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ MODAL (ONBOARDING + DIALOGS) ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;box-shadow:0 24px 80px var(--shadow-deep);width:100%;transition:background 0.25s;}

/* Onboarding modal */
#ob-modal .modal{max-width:540px;}
.ob-head{padding:22px 24px 16px;border-bottom:1px solid var(--border);}
.ob-logo{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ob-logo-icon{width:36px;height:36px;}
.ob-title{font-size:1.15rem;font-weight:800;color:var(--accent);}
.ob-subtitle{font-size:0.78rem;color:var(--text-dim);font-family:var(--mono);}
.ob-body{padding:16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ob-card{background:var(--surface2);border:1px solid var(--border3);border-radius:9px;padding:12px 13px;}
.ob-card-icon{font-size:1.4rem;margin-bottom:5px;}
.ob-card-title{font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.ob-card-text{font-size:0.74rem;color:var(--text-dim);line-height:1.6;font-family:var(--mono);}
.ob-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}

/* Add-node dialog */
#dlg .modal{max-width:300px;padding:22px;}
#dlg .modal h3{font-size:0.95rem;margin-bottom:14px;color:var(--text);}
.dlgbtns{display:flex;gap:8px;margin-top:13px;justify-content:flex-end;}
</style>
</head>
<body class="light">

<header>
  <div class="logo">
    <svg class="logo-icon" id="logo-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#143a1a"/>
      <polygon points="16,4 7,17 12,17 9,26 23,26 20,17 25,17" fill="#4dcc80"/>
      <rect x="14.5" y="24.5" width="3" height="3" rx="0.5" fill="#143a1a"/>
    </svg>
    <div class="logo-text">
      <span class="logo-name" id="logo-name">EUDR Tvůrce</span>
      <span class="logo-sub" id="logo-sub">NLI · ČR</span>
    </div>
  </div>
  <div class="h-sep"></div>
  <button class="hbtn" id="btn-import"  onclick="importJSON()">⬆ Import</button>
  <button class="hbtn grn"   id="btn-ejson" onclick="exportJSON()">⬇ JSON</button>
  <button class="hbtn amber" id="btn-ehtml" onclick="exportHTML()">⬇ HTML</button>
  <div class="h-spacer"></div>
  <button class="icon-btn" id="btn-ob"   onclick="showOB()"    title="Nápověda / Help">?</button>
  <button class="icon-btn" id="btn-lang" onclick="toggleLang()" title="Jazyk / Language" style="font-size:0.72rem;font-family:var(--mono);">EN</button>
  <button class="icon-btn" id="btn-theme" onclick="toggleTheme()" title="Světlý/tmavý / Light/dark">☀</button>
  <div class="h-sep"></div>
  <button class="hbtn primary" id="btn-addnode" onclick="showDlg()">＋ <span id="lbl-addnode">Přidat uzel</span></button>
</header>

<main>
  <div id="canvas-wrap">
    <div id="canvas-transform"><svg id="svg-layer"></svg></div>
    <div id="ctb">
      <button class="ctbbtn ac" onclick="showDlg()">＋ <span id="lbl-node">Uzel</span></button>
      <div class="ctbsep"></div>
      <button class="ctbbtn" id="lbl-autolayout" onclick="resetLayout()">⟳ Auto-rozložení</button>
      <button class="ctbbtn" id="lbl-fit" onclick="fitView()">⊡ Přizpůsobit</button>
      <div class="ctbsep"></div>
      <button class="ctbbtn" onclick="zoomBy(1.15)">＋</button>
      <span class="zoomlbl" id="zlbl">100%</span>
      <button class="ctbbtn" onclick="zoomBy(0.87)">－</button>
    </div>
  </div>

  <div id="resizer"></div>

  <div id="right-panel">
    <div class="tabs">
      <div class="tab active" data-tab="editor"   onclick="switchTab('editor')"   id="tab-editor">Editor uzlu</div>
      <div class="tab"        data-tab="json"     onclick="switchTab('json')"     id="tab-json">JSON</div>
      <div class="tab"        data-tab="template" onclick="switchTab('template')" id="tab-template">Šablona</div>
      <div class="tab"        data-tab="preview"  onclick="switchTab('preview')"  id="tab-preview">Náhled</div>
    </div>
    <div class="pane active" data-tab="editor"><div id="ned"></div></div>

// HELPERS
// ══════════════════════════════════════════════
function nodeEntries(){return Object.entries(tree).filter(([k])=>!k.startsWith('_'));}
function nodeIds(){return Object.keys(tree).filter(k=>!k.startsWith('_'));}
function fields(){return tree._fields||[];}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ══════════════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════════════
function autoLayout(){
  const lvls={},seen=new Set(),ids=nodeIds();
  const root=ids.includes('start')?'start':ids[0];
  if(!root)return;
  const q=[{id:root,l:0}];seen.add(root);
  while(q.length){
    const{id,l}=q.shift();
    if(!lvls[l])lvls[l]=[];
    lvls[l].push(id);
    if(tree[id])for(const tv of Object.values(tree[id].answers||{}))
      if(!seen.has(tv)&&tree[tv]){seen.add(tv);q.push({id:tv,l:l+1});}
  }
  const CW=290,RH=210;pos={};
  for(const[l,nids]of Object.entries(lvls)){
    const sy=700-nids.length*RH/2;
    nids.forEach((id,i)=>pos[id]={x:80+ +l*CW,y:sy+i*RH});
  }
  let oy=60;
  for(const id of ids)if(!pos[id]){pos[id]={x:60,y:oy};oy+=180;}
}

function nodeH(id){
  const n=tree[id];if(!n)return NH+NBP*2+ADDH;
  return NH+NBP*2+Object.keys(n.answers||{}).length*ANH+ADDH;
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderAll(){renderCanvas();renderJSONArea();renderPreview();renderNED();}

const CT=document.getElementById('canvas-transform');
const SVG=document.getElementById('svg-layer');

function renderCanvas(){
  CT.querySelectorAll('.node').forEach(n=>n.remove());
  for(const[id,d]of nodeEntries())CT.appendChild(mkNode(id,d,pos[id]||{x:100,y:100}));
  renderArrows();
}

function mkNode(id,d,p){
  const isS=id==='start',isT=!Object.keys(d.answers||{}).length,isSel=id===selId;
  const el=document.createElement('div');
  el.className='node'+(isS?' nstart':'')+(isT?' nterm':'')+(isSel?' selected':'');
  el.dataset.id=id;
  el.style.cssText=`left:${p.x}px;top:${p.y}px`;
  const title=d.title||'';
  const ansHtml=Object.entries(d.answers||{}).map(([a,tv],i)=>{
    const c=C[i%C.length];
    return `<div class="nans"><div class="npill" style="color:${c};border-color:${c}30;background:${c}14" title="${ea(a)} → ${ea(tv)}">${eh(a)}</div></div>`;
  }).join('');
  const badge=(isS?'▶ START — ':'')+(isT?'● VÝSLEDEK — ':'')+id;
  el.innerHTML=`
    <div class="nhead">
      <div class="nbadge">${badge}</div>
      <div class="ntitle${!title?' empty':''}">${eh(title)||'(bez názvu)'}</div>
    </div>
    <div class="nbody">${ansHtml}<div class="nadd" data-addans="${id}">＋ ${t('addAnswer').replace('＋ ','')}</div></div>`;
  el.addEventListener('mousedown',e=>{
    if(e.button!==0)return;e.stopPropagation();
    if(e.target.closest('[data-addans]')){quickAdd(id);return;}
    selectNode(id);
    _drag={type:'node',id,sx:e.clientX,sy:e.clientY,nx:p.x,ny:p.y};
    CT.style.cursor='grabbing';
  });
  return el;
}

function renderArrows(){
  while(SVG.firstChild)SVG.removeChild(SVG.firstChild);
  const defs=svgel('defs');SVG.appendChild(defs);
  for(const[sid,d]of nodeEntries()){
    const sp=pos[sid];if(!sp)continue;
    Object.entries(d.answers||{}).forEach(([ans,tid],i)=>{
      const tp=pos[tid];if(!tp)return;
      const c=C[i%C.length],th=nodeH(tid);
      const sx=sp.x+NW,sy=sp.y+NH+NBP+i*ANH+ANH/2;
      const tx=tp.x,ty=tp.y+th/2;
      const dist=Math.abs(tx-sx),bend=Math.max(65,dist*0.42);
      const mid=`arr_${sid}_${i}`.replace(/[^a-z0-9_]/g,'_');
      const mk=svgel('marker');
      mk.setAttribute('id',mid);mk.setAttribute('markerWidth','8');mk.setAttribute('markerHeight','6');
      mk.setAttribute('refX','7');mk.setAttribute('refY','3');mk.setAttribute('orient','auto');
      const pl=svgel('polygon');pl.setAttribute('points','0 0, 8 3, 0 6');pl.setAttribute('fill',c);
      mk.appendChild(pl);defs.appendChild(mk);
      const path=svgel('path');
      path.setAttribute('d',`M${sx} ${sy} C${sx+bend} ${sy},${tx-bend} ${ty},${tx} ${ty}`);
      path.setAttribute('stroke',c);path.setAttribute('stroke-width','1.8');
      path.setAttribute('fill','none');path.setAttribute('opacity','0.55');
      path.setAttribute('marker-end',`url(#${mid})`);SVG.appendChild(path);
      const lx=(sx+tx)/2,ly=Math.min(sy,ty)-8;
      const ls=ans.length>17?ans.slice(0,15)+'…':ans,lw=ls.length*5.5+10;
      const bg=svgel('rect');
      bg.setAttribute('x',lx-lw/2);bg.setAttribute('y',ly-11);
      bg.setAttribute('width',lw);bg.setAttribute('height',15);
      bg.setAttribute('rx',3);
      // Use a semi-transparent background that works in both themes
      bg.setAttribute('fill','rgba(8,20,8,0.82)');
      SVG.appendChild(bg);
      const lb=svgel('text');
      lb.setAttribute('x',lx);lb.setAttribute('y',ly);lb.setAttribute('text-anchor','middle');
      lb.setAttribute('font-size','9.5');lb.setAttribute('font-family','JetBrains Mono,monospace');
      lb.setAttribute('fill',c);lb.setAttribute('opacity','0.9');
      lb.textContent=ls;SVG.appendChild(lb);
    });
  }
}

function svgel(t2){return document.createElementNS('http://www.w3.org/2000/svg',t2);}
function applyTF(){
  CT.style.transform=`translate(${tf.x}px,${tf.y}px) scale(${tf.s})`;
  document.getElementById('zlbl').textContent=Math.round(tf.s*100)+'%';
}

// CANVAS + PANEL RESIZE EVENTS
// ══════════════════════════════════════════════
function setupEvents(){
  const wrap=document.getElementById('canvas-wrap');
  const rp=document.getElementById('right-panel');
  const resizer=document.getElementById('resizer');

  // Canvas pan/deselect
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    if(!e.target.closest('.node')){
      _drag={type:'canvas',sx:e.clientX,sy:e.clientY,tx:tf.x,ty:tf.y};
      wrap.style.cursor='grabbing';
      if(selId){selId=null;document.querySelectorAll('.node.selected').forEach(n=>n.classList.remove('selected'));renderNED();}
    }
  });

  // Panel resizer
  resizer.addEventListener('mousedown',e=>{
    _resizing=true;_resX=e.clientX;_resW=rp.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });

  document.addEventListener('mousemove',e=>{
    if(_drag){
      if(_drag.type==='node'){
        const dx=(e.clientX-_drag.sx)/tf.s,dy=(e.clientY-_drag.sy)/tf.s;
        const nx=_drag.nx+dx,ny=_drag.ny+dy;
        pos[_drag.id]={x:nx,y:ny};
        const el=CT.querySelector(`.node[data-id="${_drag.id}"]`);
        if(el){el.style.left=nx+'px';el.style.top=ny+'px';}
        renderArrows();
      }else{
        tf.x=_drag.tx+(e.clientX-_drag.sx);
        tf.y=_drag.ty+(e.clientY-_drag.sy);
        applyTF();
      }
    }
    if(_resizing){
      const delta=_resX-e.clientX;
      const newW=Math.max(260,Math.min(720,_resW+delta));
      rp.style.width=newW+'px';
    }
  });

  document.addEventListener('mouseup',()=>{
    _drag=null;
    document.getElementById('canvas-wrap').style.cursor='';
    CT.style.cursor='';
    if(_resizing){
      _resizing=false;
      document.getElementById('resizer').classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
    }
  });

  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.12:0.9,ns=Math.min(3,Math.max(0.15,tf.s*f));
    const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    tf.x=mx-(mx-tf.x)*(ns/tf.s);tf.y=my-(my-tf.y)*(ns/tf.s);tf.s=ns;applyTF();
  },{passive:false});
}

function zoomBy(f){tf.s=Math.min(3,Math.max(0.15,tf.s*f));applyTF();}

function fitView(anim){
  const wrap=document.getElementById('canvas-wrap'),ids=Object.keys(pos);
  if(!ids.length)return;
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  for(const id of ids){const p=pos[id],h=nodeH(id);mx=Math.min(mx,p.x);my=Math.min(my,p.y);Mx=Math.max(Mx,p.x+NW);My=Math.max(My,p.y+h);}
  const W=wrap.clientWidth,H=wrap.clientHeight,pd=70;
  tf.s=Math.min(1.6,Math.max(0.15,Math.min((W-pd*2)/(Mx-mx),(H-pd*2)/(My-my))));
  tf.x=pd-mx*tf.s;tf.y=pd-my*tf.s;applyTF();
}

// ══════════════════════════════════════════════
function uf(id,f,v){if(!tree[id])return;tree[id][f]=v;refreshNode(id);renderJSONArea();renderPreview();}

function chAns(nid,idx,newT,newTgt){
  if(!tree[nid])return;
  const e=Object.entries(tree[nid].answers||{});
  const[ot,og]=e[idx]||['',''];
  const tv=newT!==null?newT:ot,tg=newTgt!==null?newTgt:og;
  const f={};e.forEach(([k,v],i)=>{f[i===idx?tv:k]=i===idx?tg:v;});
  tree[nid].answers=f;
  refreshNode(nid);renderArrows();renderJSONArea();renderPreview();
}

function addAns(nid){
  if(!tree[nid])return;
  let tv='nová odpověď',n=2;
  while(tree[nid].answers[tv])tv=`nová odpověď ${n++}`;
  tree[nid].answers[tv]=nodeIds()[0]||nid;
  refreshNode(nid);renderArrows();renderNED();renderJSONArea();renderPreview();
}

function quickAdd(nid){addAns(nid);selectNode(nid);}

function delAns(nid,idx){
  if(!tree[nid])return;
  const e=Object.entries(tree[nid].answers||{}),f={};
  e.forEach(([k,v],i)=>{if(i!==idx)f[k]=v;});
  tree[nid].answers=f;
  refreshNode(nid);renderArrows();renderNED();renderJSONArea();renderPreview();
}

function delNode(id){
  if(id==='start'){notify(t('nCannotDel'));return;}
  delete tree[id];delete pos[id];
  for(const n of Object.values(tree))
    if(n&&n.answers)for(const[k,v]of Object.entries(n.answers))if(v===id)delete n.answers[k];
  if(selId===id)selId=null;
  renderCanvas();renderNED();renderJSONArea();renderPreview();
}

function refreshNode(id){
  const p=pos[id],old=CT.querySelector(`.node[data-id="${id}"]`);
  if(old&&p&&tree[id])CT.replaceChild(mkNode(id,tree[id],p),old);
}

// JSON
// ══════════════════════════════════════════════
function treeWithMeta(){
  const out=JSON.parse(JSON.stringify(tree));
  out._template={cssVars:tmpl.cssVars,_qTpl:tmpl._qTpl,_rTpl:tmpl._rTpl};
  return out;
}

function loadMeta(p){
  if(p._template){
    const m=p._template;
    if(Array.isArray(m.cssVars))tmpl.cssVars=m.cssVars;
    if(typeof m._qTpl==='string')tmpl._qTpl=m._qTpl;
    if(typeof m._rTpl==='string')tmpl._rTpl=m._rTpl;
  }
}

function renderJSONArea(){
  if(_jpause)return;
  const ta=document.getElementById('json-area');
  ta.value=JSON.stringify(treeWithMeta(),null,2);
  ta.classList.remove('err');
}

document.getElementById('json-area').addEventListener('input',function(){
  if(_jpause)return;
  try{
    const p=JSON.parse(this.value);this.classList.remove('err');
    _jpause=true;tree=p;loadMeta(p);
    for(const id of nodeIds())if(!pos[id])pos[id]={x:100+Math.random()*400,y:100+Math.random()*400};
    renderCanvas();renderPreview();renderNED();
    if(document.querySelector('.pane[data-tab="template"].active'))renderTplTab();
    _jpause=false;
  }catch{this.classList.add('err');}
});

function applyJSON(){
  const ta=document.getElementById('json-area');
  try{
    const p=JSON.parse(ta.value);_jpause=true;tree=p;loadMeta(p);
    for(const id of nodeIds())if(!pos[id])pos[id]={x:100+Math.random()*400,y:100+Math.random()*400};
    renderCanvas();renderPreview();renderNED();renderTplTab();_jpause=false;
    ta.classList.remove('err');notify(t('nJsonApplied'));
  }catch{ta.classList.add('err');notify(t('nJsonInvalid'));}
}

function fmtJSON(){
  const ta=document.getElementById('json-area');
  try{ta.value=JSON.stringify(JSON.parse(ta.value),null,2);ta.classList.remove('err');}
  catch{notify(t('nJsonFmt'));}
}

function copyJSON(){
  navigator.clipboard.writeText(JSON.stringify(treeWithMeta(),null,2)).then(()=>notify(t('nJsonCopied')));
}

function renderTplTab(){

    <div class="tvar-row">
      <input type="text" class="tvar-key" value="${ea(row.key)}" placeholder="--jmeno"

        onchange="setCVarLabel(${i},this.value)">

        oninput="setCVarVal(${i},this.value,true)">`:''}

        oninput="setCVarVal(${i},this.value,false)">

    </div>`).join('');

  const fieldRows=flds.map((f,i)=>`
    <div class="tfield-row">
      <input class="tfield-id" value="${ea(f.id)}" placeholder="id-pole"
        onchange="setFieldId(${i},this.value)"

      <input value="${ea(f.label)}" placeholder="Popis pole…"
        onchange="setFieldLabel(${i},this.value)">
      <button class="tfield-del" onclick="delField(${i})" title="Smazat">×</button>
    </div>`).join('');

  const tokChips=(toks,gold=[])=>toks.map(tk=>`<span class="tok${gold.includes(tk)?' gold':''}" onclick="insertTok(this)">{${tk}}</span>`).join('');

  document.getElementById('tpl-ed').innerHTML=`

    <div class="tsec">
      <div class="tsec-head">${t('cssVars')}<div class="tsec-line"></div><button class="tsec-add" onclick="addCVar()">${t('addVar')}</button></div>
      <div class="tsec-desc">${t('cssVarsDesc')}</div>
      ${cssRows}
    </div>

    <div class="tsec">
      <div class="tsec-head">${t('customFieldsSection')}<div class="tsec-line"></div><button class="tsec-add" onclick="addField()">${t('addField')}</button></div>
      <div class="tsec-desc">${t('customFieldsDesc')}</div>
      ${fieldRows||`<div style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);padding:4px 0">${t('noFields')}</div>`}
    </div>

    <div class="tsec">
      <div class="tsec-head">${t('qTplTitle')}<div class="tsec-line"></div></div>
      <div class="tsec-desc">${t('tokenHint')}</div>
      <div class="tokens">
        ${tokChips(['title','description'])}
        <span class="tok gold" onclick="insertTok(this)">{answers}</span>
        ${flds.map(f=>`<span class="tok" onclick="insertTok(this)">{${f.id}}</span>`).join('')}
      </div>
      <textarea class="ttpl" id="tpl-q" rows="5"
        oninput="tmpl._qTpl=this.value;renderPreview()">${eh(tmpl._qTpl)}</textarea>
    </div>

    <div class="tsec">
      <div class="tsec-head">${t('rTplTitle')}<div class="tsec-line"></div></div>
      <div class="tsec-desc">${t('tokenHint')}</div>
      <div class="tokens">
        ${tokChips(['title','description'])}
        ${flds.map(f=>`<span class="tok" onclick="insertTok(this)">{${f.id}}</span>`).join('')}
      </div>
      <textarea class="ttpl" id="tpl-r" rows="5"
        oninput="tmpl._rTpl=this.value;renderPreview()">${eh(tmpl._rTpl)}</textarea>
    </div>
  `;
}

function insertTok(el){
  const tok=el.textContent;
  const f=document.activeElement;
  if(f&&(f.id==='tpl-q'||f.id==='tpl-r')){
    const s=f.selectionStart,e2=f.selectionEnd;
    f.value=f.value.slice(0,s)+tok+f.value.slice(e2);
    f.selectionStart=f.selectionEnd=s+tok.length;
    f.dispatchEvent(new Event('input'));
  }else{
    navigator.clipboard.writeText(tok).then(()=>notify(t('nTokCopied')+': '+tok));
  }
}

function setCVarKey(i,v){
  if(!tmpl.cssVars[i])return;
  if(!v.startsWith('--'))v='--'+v.replace(/[^a-z0-9-]/g,'');
  tmpl.cssVars[i].key=v;renderPreview();
}
function setCVarLabel(i,v){if(tmpl.cssVars[i])tmpl.cssVars[i].label=v;}
function setCVarVal(i,v,fromColor){
  if(!tmpl.cssVars[i])return;
  tmpl.cssVars[i].val=v;
  if(fromColor){const el=document.getElementById(`tvv-${i}`);if(el)el.value=v;}
  renderPreview();
}
function addCVar(){tmpl.cssVars.push({key:'--nova',label:'Nová proměnná',val:'#ffffff'});renderTplTab();renderPreview();}
function delCVar(i){tmpl.cssVars.splice(i,1);renderTplTab();renderPreview();}

function addField(){
  if(!tree._fields)tree._fields=[];
  tree._fields.push({id:'pole-'+Math.random().toString(36).slice(2,5),label:'Nové pole'});
  renderTplTab();renderNED();renderJSONArea();renderPreview();
}
function setFieldId(i,v){
  const f=fields();if(!f[i])return;
  f[i].id=v.toLowerCase().replace(/[^a-z0-9-]/g,'-');
  renderTplTab();renderNED();renderJSONArea();renderPreview();
}
function setFieldLabel(i,v){
  const f=fields();if(!f[i])return;
  f[i].label=v;renderTplTab();renderNED();renderJSONArea();
}
function delField(i){
  const f=fields();if(!f[i])return;
  f.splice(i,1);
  if(!f.length)delete tree._fields;
  renderTplTab();renderNED();renderJSONArea();renderPreview();
}

// HTML GENERATION
// ══════════════════════════════════════════════
function genHTML(){
  const flds=fields();
  const entries=nodeEntries();
  const firstId=entries.some(([k])=>k==='start')?'start':(entries[0]?.[0]||'start');
  const rootVars=tmpl.cssVars.map(r=>`  ${r.key}: ${r.val};`).join('\n');

  const slides=entries.map(([id,nd])=>{
    const ansl=Object.entries(nd.answers||{}),isTerm=!ansl.length;
    const answersHTML=ansl.map(([a,tv])=>`<button class="btn" onclick="go('${tv}')">${eh(a)}</button>`).join('');
    let tpl=isTerm?tmpl._rTpl:tmpl._qTpl;
    tpl=tpl.replace(/\{title\}/g,eh(nd.title||id)).replace(/\{description\}/g,eh(nd.description||''));
    if(!isTerm)tpl=tpl.replace(/\{answers\}/g,answersHTML);
    for(const f of flds)tpl=tpl.replace(new RegExp(`\\{${f.id}\\}`,'g'),eh(nd[f.id]||''));
    return `<div class="slide" id="slide-${id}">\n${tpl}\n</div>`;
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUDR — Rozhodovací strom</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
${rootVars}
}
body{background:var(--bg,#09090f);color:var(--text,#d8d8f0);font-family:var(--font,'Segoe UI',system-ui,sans-serif);height:100vh;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;padding:40px;text-align:center;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;transform:translateY(10px)}
.slide.active{opacity:1;pointer-events:auto;transform:translateY(0)}
h2{font-size:clamp(1.3rem,3.5vw,2rem);font-weight:700;max-width:580px;line-height:1.35;color:var(--h2,#eeeeff)}
.sub{color:var(--sub,#6060a0);max-width:480px;line-height:1.75;font-size:.95rem;margin:0}
.ch{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:640px;margin-top:4px}
.btn{padding:13px 26px;background:var(--btn-bg,rgba(42,122,56,0.12));color:var(--btn-fg,#5db870);border:1.5px solid var(--btn-bdr,rgba(42,122,56,0.3));border-radius:10px;font-size:1rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{background:var(--btn-hov,rgba(42,122,56,0.25));color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn.sec{background:rgba(255,255,255,.05);color:#505090;border-color:rgba(255,255,255,.1);font-size:.85rem}
.btn.sec:hover{color:#9090d0;background:rgba(255,255,255,.1);transform:none;box-shadow:none}
.res{font-size:clamp(1.5rem,4.5vw,2.5rem);font-weight:700;color:var(--res,#eeeeff);max-width:560px;line-height:1.25}
.rsub{color:var(--res-sub,#5050a0);font-size:.95rem;max-width:460px;line-height:1.75;margin:0}
</style>
</head>
<body>
${slides}
<script>
function go(id){
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById('slide-'+id);
  if(el)el.classList.add('active');
}
go('${firstId}');
<\/script>
</body>
</html>`;
}
