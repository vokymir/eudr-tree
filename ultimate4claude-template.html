<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeCraft — Decision Tree Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080810;
            --surface: #10101e;
            --surface2: #18182a;
            --border: #28284a;
            --border2: #38386a;
            --accent: #7c6dff;
            --accent-glow: rgba(124, 109, 255, 0.18);
            --red: #ff5f7e;
            --green: #4dcc88;
            --gold: #ffd166;
            --text: #d8d8f0;
            --text-dim: #5a5a90;
            --text-mid: #9090b8;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Syne', sans-serif;
            --node-w: 220px;
            --r: 10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ── HEADER ── */
        header {
            height: 50px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            flex-shrink: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.03em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .logo-sub {
            font-size: 0.6rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .h-sep {
            width: 1px;
            height: 22px;
            background: var(--border);
            margin: 0 3px;
            flex-shrink: 0;
        }

        .h-spacer {
            flex: 1;
        }

        .hbtn {
            padding: 5px 12px;
            border-radius: 6px;
            font-family: var(--mono);
            font-size: 0.67rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-mid);
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .hbtn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .hbtn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .hbtn.primary:hover {
            background: #9484ff;
        }

        .hbtn.green {
            border-color: #2a5a3a;
            color: var(--green);
        }

        .hbtn.green:hover {
            background: rgba(77, 204, 136, 0.1);
            border-color: var(--green);
        }

        .hbtn.gold {
            border-color: #5a4a1a;
            color: var(--gold);
        }

        .hbtn.gold:hover {
            background: rgba(255, 209, 102, 0.1);
            border-color: var(--gold);
        }

        /* ── LAYOUT ── */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── CANVAS ── */
        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg);
            background-image: radial-gradient(circle, rgba(38, 38, 68, 0.9) 1px, transparent 1px);
            background-size: 26px 26px;
        }

        #canvas-transform {
            position: absolute;
            top: 0;
            left: 0;
            width: 6000px;
            height: 6000px;
            transform-origin: 0 0;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 6000px;
            height: 6000px;
            pointer-events: none;
            overflow: visible;
        }

        /* ── NODES ── */
        .node {
            position: absolute;
            width: var(--node-w);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            cursor: grab;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .node:hover {
            border-color: var(--border2);
        }

        .node.selected {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        .node.nstart {
            border-color: rgba(255, 209, 102, 0.5);
        }

        .node.nstart .nhead {
            background: rgba(255, 209, 102, 0.05);
        }

        .node.nterm {
            border-color: rgba(77, 204, 136, 0.4);
        }

        .node.nterm .nhead {
            background: rgba(77, 204, 136, 0.05);
        }

        .nhead {
            padding: 9px 10px 8px;
            border-bottom: 1px solid var(--border);
            border-radius: calc(var(--r) - 1.5px) calc(var(--r) - 1.5px) 0 0;
        }

        .nbadge {
            font-family: var(--mono);
            font-size: 0.57rem;
            color: var(--text-dim);
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .nstart .nbadge {
            color: rgba(255, 209, 102, 0.6);
        }

        .nterm .nbadge {
            color: rgba(77, 204, 136, 0.6);
        }

        .ntitle {
            font-size: 0.77rem;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .ntitle.empty {
            color: var(--text-dim);
            font-weight: 400;
            font-style: italic;
        }

        .nbody {
            padding: 7px 8px 5px;
        }

        .nans {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .npill {
            flex: 1;
            padding: 3px 7px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.6rem;
            border: 1px solid;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
        }

        .nadd {
            display: flex;
            align-items: center;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-dim);
            cursor: pointer;
            padding: 3px 2px;
            border-radius: 3px;
            transition: color 0.12s;
        }

        .nadd:hover {
            color: var(--accent);
        }

        /* ── RIGHT PANEL ── */
        #right-panel {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            background: var(--surface);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
        }

        .tabs::-webkit-scrollbar {
            height: 0;
        }

        .tab {
            padding: 10px 12px;
            font-family: var(--mono);
            font-size: 0.63rem;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: all 0.12s;
            letter-spacing: 0.02em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab:hover:not(.active) {
            color: var(--text-mid);
        }

        .pane {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .pane.active {
            display: flex;
        }

        /* ── NODE EDITOR ── */
        #ned {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            user-select: text;
            -webkit-user-select: text;
        }

        .neempty {
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.7rem;
            text-align: center;
            padding: 60px 20px;
            line-height: 2.2;
        }

        .neempty big {
            display: block;
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .neg {
            margin-bottom: 12px;
        }

        .nelabel {
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nelabel-tok {
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(124, 109, 255, 0.25);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.55rem;
        }

        .neinput,
        .neselect,
        .netarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 6px 9px;
            font-family: var(--mono);
            font-size: 0.71rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.12s;
        }

        .neinput:focus,
        .neselect:focus,
        .netarea:focus {
            border-color: var(--accent);
        }

        .neinput[readonly] {
            color: var(--text-dim);
            cursor: default;
            background: var(--surface);
        }

        .neselect {
            cursor: pointer;
        }

        .netarea {
            resize: vertical;
            min-height: 48px;
            line-height: 1.5;
        }

        .nesec {
            display: flex;
            align-items: center;
            margin: 16px 0 9px;
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            gap: 8px;
        }

        .nesec-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .acard {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px;
            margin-bottom: 7px;
        }

        .acard-top {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .adot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .adel {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .adel:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255, 95, 126, 0.1);
        }

        .addansbtn {
            width: 100%;
            padding: 7px;
            background: transparent;
            border: 1px dashed var(--border2);
            border-radius: 6px;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.67rem;
            cursor: pointer;
            transition: all 0.12s;
            margin-bottom: 10px;
        }

        .addansbtn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .delnodebtn {
            width: 100%;
            padding: 7px;
            background: rgba(255, 95, 126, 0.05);
            border: 1px solid rgba(255, 95, 126, 0.2);
            border-radius: 6px;
            color: var(--red);
            font-family: var(--mono);
            font-size: 0.67rem;
            cursor: pointer;
            transition: all 0.12s;
            margin-top: 14px;
        }

        .delnodebtn:hover {
            background: rgba(255, 95, 126, 0.14);
            border-color: var(--red);
        }

        /* ── JSON ── */
        #json-area {
            flex: 1;
            background: #05050d;
            border: none;
            resize: none;
            font-family: var(--mono);
            font-size: 0.69rem;
            line-height: 1.65;
            color: #88aaee;
            padding: 14px 16px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        #json-area.err {
            color: var(--red) !important;
        }

        .pfooter {
            padding: 7px 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ── PREVIEW ── */
        #preview-frame {
            flex: 1;
            border: none;
            background: #000;
        }

        /* ── TEMPLATE EDITOR ── */
        #tpl-ed {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            user-select: text;
            -webkit-user-select: text;
        }

        .tsec {
            margin-bottom: 20px;
        }

        .tsec-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tsec-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .tsec-add {
            padding: 2px 8px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.6rem;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text-dim);
            transition: all 0.12s;
            flex-shrink: 0;
        }

        .tsec-add:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* CSS var row */
        .tvar-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .tvar-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-mid);
            width: 96px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input.tvar-color {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            padding: 2px;
            background: var(--surface2);
        }

        input.tvar-val {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 7px;
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.12s;
            min-width: 0;
        }

        input.tvar-val:focus {
            border-color: var(--accent);
        }

        input.tvar-key {
            width: 90px;
            flex-shrink: 0;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 7px;
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--text-mid);
            outline: none;
            transition: border-color 0.12s;
        }

        input.tvar-key:focus {
            border-color: var(--accent);
        }

        .tvar-del {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.12s;
        }

        .tvar-del:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255, 95, 126, 0.1);
        }

        /* Custom field row */
        .tfield-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .tfield-row input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 7px;
            font-family: var(--mono);
            font-size: 0.63rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.12s;
            min-width: 0;
        }

        .tfield-row input:focus {
            border-color: var(--accent);
        }

        .tfield-id {
            width: 100px;
            flex-shrink: 0;
            color: var(--accent) !important;
        }

        .tfield-label {
            flex: 1;
        }

        .tfield-note {
            font-family: var(--mono);
            font-size: 0.57rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        /* Token chips */
        .tokens {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 7px;
        }

        .tok {
            font-family: var(--mono);
            font-size: 0.59rem;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(124, 109, 255, 0.25);
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            user-select: all;
            -webkit-user-select: all;
            transition: background 0.12s;
        }

        .tok:hover {
            background: rgba(124, 109, 255, 0.28);
        }

        .tok.secondary {
            color: var(--gold);
            background: rgba(255, 209, 102, 0.08);
            border-color: rgba(255, 209, 102, 0.2);
        }

        /* Template textareas */
        .ttpl {
            width: 100%;
            min-height: 88px;
            background: #05050d;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 8px 9px;
            font-family: var(--mono);
            font-size: 0.66rem;
            color: #aaddff;
            outline: none;
            resize: vertical;
            line-height: 1.6;
            transition: border-color 0.12s;
        }

        .ttpl:focus {
            border-color: var(--accent);
        }

        /* ── CANVAS TOOLBAR ── */
        #ctb {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            gap: 5px;
            align-items: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
            z-index: 50;
        }

        .ctbsep {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 3px;
        }

        .ctbbtn {
            padding: 5px 10px;
            border-radius: 20px;
            font-family: var(--mono);
            font-size: 0.64rem;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-mid);
            transition: all 0.12s;
        }

        .ctbbtn:hover {
            background: var(--surface2);
            border-color: var(--border);
            color: var(--text);
        }

        .ctbbtn.ac {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .ctbbtn.ac:hover {
            background: #9484ff;
        }

        .zoomlbl {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-dim);
            min-width: 38px;
            text-align: center;
        }

        /* ── NOTIF ── */
        #notif {
            position: fixed;
            bottom: 16px;
            right: 400px;
            background: var(--surface2);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.66rem;
            padding: 7px 14px;
            border-radius: 6px;
            opacity: 0;
            transform: translateY(6px);
            transition: all 0.22s;
            pointer-events: none;
            z-index: 9999;
        }

        #notif.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── DIALOG ── */
        #dlg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #dlg.open {
            display: flex;
        }

        .dlgbox {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 22px;
            width: 300px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }

        .dlgbox h3 {
            font-size: 0.9rem;
            margin-bottom: 14px;
            color: var(--text);
        }

        .dlgbtns {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">⬡ TreeCraft <span class="logo-sub">editor</span></div>
        <div class="h-sep"></div>
        <button class="hbtn" onclick="importJSON()">⬆ Import</button>
        <button class="hbtn green" onclick="exportJSON()">⬇ JSON</button>
        <button class="hbtn gold" onclick="exportHTML()">⬇ HTML</button>
        <div class="h-spacer"></div>
        <button class="hbtn primary" onclick="showDlg()">＋ Add Node</button>
    </header>

    <main>
        <div id="canvas-wrap">
            <div id="canvas-transform">
                <svg id="svg-layer"></svg>
            </div>
            <div id="ctb">
                <button class="ctbbtn ac" onclick="showDlg()">＋ Node</button>
                <div class="ctbsep"></div>
                <button class="ctbbtn" onclick="resetLayout()">⟳ Auto-layout</button>
                <button class="ctbbtn" onclick="fitView()">⊡ Fit</button>
                <div class="ctbsep"></div>
                <button class="ctbbtn" onclick="zoomBy(1.15)">＋</button>
                <span class="zoomlbl" id="zlbl">100%</span>
                <button class="ctbbtn" onclick="zoomBy(0.87)">－</button>
            </div>
        </div>

        <div id="right-panel">
            <div class="tabs">
