<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreeCraft — Decision Tree Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --surface: #10101e;
  --surface2: #18182a;
  --border: #28284a;
  --border2: #38386a;
  --accent: #7c6dff;
  --accent-glow: rgba(124,109,255,0.18);
  --red: #ff5f7e;
  --green: #4dcc88;
  --gold: #ffd166;
  --text: #d8d8f0;
  --text-dim: #5a5a90;
  --text-mid: #9090b8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --node-w: 220px;
  --r: 10px;
}

body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

/* ── HEADER ── */
header { height: 50px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; z-index: 100; }
.logo { font-weight: 800; font-size: 1rem; letter-spacing: -0.03em; color: var(--accent); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.logo-sub { font-size: 0.6rem; color: var(--text-dim); font-weight: 400; }
.h-sep { width: 1px; height: 22px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
.h-spacer { flex: 1; }
.hbtn { padding: 5px 12px; border-radius: 6px; font-family: var(--mono); font-size: 0.67rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-mid); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.hbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.hbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.hbtn.primary:hover { background: #9484ff; }
.hbtn.green { border-color: #2a5a3a; color: var(--green); }
.hbtn.green:hover { background: rgba(77,204,136,0.1); border-color: var(--green); }
.hbtn.gold { border-color: #5a4a1a; color: var(--gold); }
.hbtn.gold:hover { background: rgba(255,209,102,0.1); border-color: var(--gold); }

/* ── LAYOUT ── */
main { flex: 1; display: flex; overflow: hidden; }

/* ── CANVAS ── */
#canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); background-image: radial-gradient(circle, rgba(38,38,68,0.9) 1px, transparent 1px); background-size: 26px 26px; }
#canvas-transform { position: absolute; top: 0; left: 0; width: 6000px; height: 6000px; transform-origin: 0 0; }
#svg-layer { position: absolute; top: 0; left: 0; width: 6000px; height: 6000px; pointer-events: none; overflow: visible; }

/* ── NODES ── */
.node { position: absolute; width: var(--node-w); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); cursor: grab; box-shadow: 0 4px 24px rgba(0,0,0,0.5); transition: border-color 0.12s, box-shadow 0.12s; }
.node:hover { border-color: var(--border2); }
.node.selected { border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.7); }
.node.nstart { border-color: rgba(255,209,102,0.5); }
.node.nstart .nhead { background: rgba(255,209,102,0.05); }
.node.nterm  { border-color: rgba(77,204,136,0.4); }
.node.nterm  .nhead { background: rgba(77,204,136,0.05); }
.nhead { padding: 9px 10px 8px; border-bottom: 1px solid var(--border); border-radius: calc(var(--r) - 1.5px) calc(var(--r) - 1.5px) 0 0; }
.nbadge { font-family: var(--mono); font-size: 0.57rem; color: var(--text-dim); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nstart .nbadge { color: rgba(255,209,102,0.6); }
.nterm  .nbadge { color: rgba(77,204,136,0.6); }
.ntitle { font-size: 0.77rem; font-weight: 600; line-height: 1.35; word-break: break-word; }
.ntitle.empty { color: var(--text-dim); font-weight: 400; font-style: italic; }
.nbody { padding: 7px 8px 5px; }
.nans { display: flex; align-items: center; margin-bottom: 4px; }
.npill { flex: 1; padding: 3px 7px; border-radius: 4px; font-family: var(--mono); font-size: 0.6rem; border: 1px solid; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
.nadd { display: flex; align-items: center; font-family: var(--mono); font-size: 0.6rem; color: var(--text-dim); cursor: pointer; padding: 3px 2px; border-radius: 3px; transition: color 0.12s; }
.nadd:hover { color: var(--accent); }

/* ── RIGHT PANEL ── */
#right-panel { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); }
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
.tabs::-webkit-scrollbar { height: 0; }
.tab { padding: 10px 12px; font-family: var(--mono); font-size: 0.63rem; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.12s; letter-spacing: 0.02em; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text-mid); }
.pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.pane.active { display: flex; }

/* ── NODE EDITOR ── */
#ned { flex: 1; overflow-y: auto; padding: 14px; user-select: text; -webkit-user-select: text; }
.neempty { color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; text-align: center; padding: 60px 20px; line-height: 2.2; }
.neempty big { display: block; font-size: 2rem; margin-bottom: 6px; }
.neg { margin-bottom: 12px; }
.nelabel { font-family: var(--mono); font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.nelabel-tok { color: var(--accent); background: var(--accent-glow); border: 1px solid rgba(124,109,255,0.25); border-radius: 3px; padding: 1px 5px; font-size: 0.55rem; }
.neinput, .neselect, .netarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 6px 9px; font-family: var(--mono); font-size: 0.71rem; color: var(--text); outline: none; transition: border-color 0.12s; }
.neinput:focus, .neselect:focus, .netarea:focus { border-color: var(--accent); }
.neinput[readonly] { color: var(--text-dim); cursor: default; background: var(--surface); }
.neselect { cursor: pointer; }
.netarea { resize: vertical; min-height: 48px; line-height: 1.5; }
.nesec { display: flex; align-items: center; margin: 16px 0 9px; font-family: var(--mono); font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; gap: 8px; }
.nesec-line { flex: 1; height: 1px; background: var(--border); }
.acard { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px; margin-bottom: 7px; }
.acard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
.adot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.adel { width: 22px; height: 22px; border-radius: 4px; border: 1px solid transparent; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: all 0.12s; display: flex; align-items: center; justify-content: center; line-height: 1; }
.adel:hover { border-color: var(--red); color: var(--red); background: rgba(255,95,126,0.1); }
.addansbtn { width: 100%; padding: 7px; background: transparent; border: 1px dashed var(--border2); border-radius: 6px; color: var(--text-dim); font-family: var(--mono); font-size: 0.67rem; cursor: pointer; transition: all 0.12s; margin-bottom: 10px; }
.addansbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.delnodebtn { width: 100%; padding: 7px; background: rgba(255,95,126,0.05); border: 1px solid rgba(255,95,126,0.2); border-radius: 6px; color: var(--red); font-family: var(--mono); font-size: 0.67rem; cursor: pointer; transition: all 0.12s; margin-top: 14px; }
.delnodebtn:hover { background: rgba(255,95,126,0.14); border-color: var(--red); }

/* ── JSON ── */
#json-area { flex: 1; background: #05050d; border: none; resize: none; font-family: var(--mono); font-size: 0.69rem; line-height: 1.65; color: #88aaee; padding: 14px 16px; outline: none; user-select: text; -webkit-user-select: text; }
#json-area.err { color: var(--red) !important; }
.pfooter { padding: 7px 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }

/* ── PREVIEW ── */
#preview-frame { flex: 1; border: none; background: #000; }

/* ── TEMPLATE EDITOR ── */
#tpl-ed { flex: 1; overflow-y: auto; padding: 14px; user-select: text; -webkit-user-select: text; }
.tsec { margin-bottom: 20px; }
.tsec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; font-family: var(--mono); font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.tsec-line { flex: 1; height: 1px; background: var(--border); }
.tsec-add { padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 0.6rem; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text-dim); transition: all 0.12s; flex-shrink: 0; }
.tsec-add:hover { border-color: var(--accent); color: var(--accent); }

/* CSS var row */
.tvar-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
.tvar-label { font-family: var(--mono); font-size: 0.6rem; color: var(--text-mid); width: 96px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
input.tvar-color { width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; flex-shrink: 0; padding: 2px; background: var(--surface2); }
input.tvar-val { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 4px 7px; font-family: var(--mono); font-size: 0.62rem; color: var(--text); outline: none; transition: border-color 0.12s; min-width: 0; }
input.tvar-val:focus { border-color: var(--accent); }
input.tvar-key { width: 90px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 4px 7px; font-family: var(--mono); font-size: 0.62rem; color: var(--text-mid); outline: none; transition: border-color 0.12s; }
input.tvar-key:focus { border-color: var(--accent); }
.tvar-del { width: 20px; height: 20px; border-radius: 3px; border: 1px solid transparent; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
.tvar-del:hover { border-color: var(--red); color: var(--red); background: rgba(255,95,126,0.1); }

/* Custom field row */
.tfield-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
.tfield-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 5px 7px; font-family: var(--mono); font-size: 0.63rem; color: var(--text); outline: none; transition: border-color 0.12s; min-width: 0; }
.tfield-row input:focus { border-color: var(--accent); }
.tfield-id { width: 100px; flex-shrink: 0; color: var(--accent) !important; }
.tfield-label { flex: 1; }
.tfield-note { font-family: var(--mono); font-size: 0.57rem; color: var(--text-dim); margin-bottom: 8px; }

/* Token chips */
.tokens { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
.tok { font-family: var(--mono); font-size: 0.59rem; color: var(--accent); background: var(--accent-glow); border: 1px solid rgba(124,109,255,0.25); border-radius: 4px; padding: 2px 6px; cursor: pointer; user-select: all; -webkit-user-select: all; transition: background 0.12s; }
.tok:hover { background: rgba(124,109,255,0.28); }
.tok.secondary { color: var(--gold); background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.2); }

/* Template textareas */
.ttpl { width: 100%; min-height: 88px; background: #05050d; border: 1px solid var(--border); border-radius: 5px; padding: 8px 9px; font-family: var(--mono); font-size: 0.66rem; color: #aaddff; outline: none; resize: vertical; line-height: 1.6; transition: border-color 0.12s; }
.ttpl:focus { border-color: var(--accent); }

/* ── CANVAS TOOLBAR ── */
#ctb { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 6px 14px; display: flex; gap: 5px; align-items: center; box-shadow: 0 8px 40px rgba(0,0,0,0.7); z-index: 50; }
.ctbsep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
.ctbbtn { padding: 5px 10px; border-radius: 20px; font-family: var(--mono); font-size: 0.64rem; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text-mid); transition: all 0.12s; }
.ctbbtn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
.ctbbtn.ac { background: var(--accent); color: #fff; border-color: var(--accent); }
.ctbbtn.ac:hover { background: #9484ff; }
.zoomlbl { font-family: var(--mono); font-size: 0.6rem; color: var(--text-dim); min-width: 38px; text-align: center; }

/* ── NOTIF ── */
#notif { position: fixed; bottom: 16px; right: 400px; background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 0.66rem; padding: 7px 14px; border-radius: 6px; opacity: 0; transform: translateY(6px); transition: all 0.22s; pointer-events: none; z-index: 9999; }
#notif.show { opacity: 1; transform: translateY(0); }

/* ── DIALOG ── */
#dlg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000; }
#dlg.open { display: flex; }
.dlgbox { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 22px; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
.dlgbox h3 { font-size: 0.9rem; margin-bottom: 14px; color: var(--text); }
.dlgbtns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ TreeCraft <span class="logo-sub">editor</span></div>
  <div class="h-sep"></div>
  <button class="hbtn" onclick="importJSON()">⬆ Import</button>
  <button class="hbtn green" onclick="exportJSON()">⬇ JSON</button>
  <button class="hbtn gold" onclick="exportHTML()">⬇ HTML</button>
  <div class="h-spacer"></div>
  <button class="hbtn primary" onclick="showDlg()">＋ Add Node</button>
</header>

<main>
  <div id="canvas-wrap">
    <div id="canvas-transform">
      <svg id="svg-layer"></svg>
    </div>
    <div id="ctb">
      <button class="ctbbtn ac" onclick="showDlg()">＋ Node</button>
      <div class="ctbsep"></div>
      <button class="ctbbtn" onclick="resetLayout()">⟳ Auto-layout</button>
      <button class="ctbbtn" onclick="fitView()">⊡ Fit</button>
      <div class="ctbsep"></div>
      <button class="ctbbtn" onclick="zoomBy(1.15)">＋</button>
      <span class="zoomlbl" id="zlbl">100%</span>
      <button class="ctbbtn" onclick="zoomBy(0.87)">－</button>
    </div>
  </div>

  <div id="right-panel">
    <div class="tabs">
      <div class="tab active" data-tab="editor" onclick="switchTab('editor')">Node Editor</div>
      <div class="tab" data-tab="json"    onclick="switchTab('json')">JSON</div>
      <div class="tab" data-tab="template" onclick="switchTab('template')">Template</div>
      <div class="tab" data-tab="preview" onclick="switchTab('preview')">Preview</div>
    </div>

    <!-- Node Editor -->
    <div class="pane active" data-tab="editor">
      <div id="ned">
        <div class="neempty"><big>⬡</big>Click a node<br>to select and edit it</div>
      </div>
    </div>

    <!-- JSON -->
    <div class="pane" data-tab="json">
      <textarea id="json-area" spellcheck="false"></textarea>
      <div class="pfooter">
        <button class="hbtn" onclick="copyJSON()">Copy</button>
        <button class="hbtn" onclick="applyJSON()">Apply</button>
        <button class="hbtn" onclick="fmtJSON()">Format</button>
      </div>
    </div>

    <!-- Template Editor -->
    <div class="pane" data-tab="template">
      <div id="tpl-ed">
        <!-- rendered by renderTplTab() -->
      </div>
    </div>

    <!-- Preview -->
    <div class="pane" data-tab="preview">
      <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
      <div class="pfooter">
        <span style="flex:1;font-family:var(--mono);font-size:0.62rem;color:var(--text-dim)">Live HTML preview</span>
        <button class="hbtn gold" onclick="exportHTML()">⬇ Export</button>
      </div>
    </div>
  </div>
</main>

<!-- Add Node Dialog -->
<div id="dlg">
  <div class="dlgbox">
    <h3>New Node</h3>
    <div class="neg">
      <div class="nelabel">Node ID (slug)</div>
      <input class="neinput" id="dlg-id" placeholder="e.g. my-question" oninput="slugify(this)">
    </div>
    <div class="neg">
      <div class="nelabel">Title</div>
      <input class="neinput" id="dlg-title" placeholder="Question text…">
    </div>
    <div class="dlgbtns">
      <button class="hbtn" onclick="closeDlg()">Cancel</button>
      <button class="hbtn primary" onclick="confirmAdd()">Create</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let tree = {};
let pos = {};
let selId = null;
let _drag = null;
let tf = { x: 60, y: 60, s: 1 };
let _jpause = false;

// Template state – stored in tree._template on export
let tmpl = {
  cssVars: [
    { key: '--bg',          label: 'Background',       val: '#09090f' },
    { key: '--text',        label: 'Body text',         val: '#d8d8f0' },
    { key: '--font',        label: 'Font family',       val: "'Segoe UI', system-ui, sans-serif" },
    { key: '--h2',          label: 'Heading',           val: '#eeeeff' },
    { key: '--sub',         label: 'Subtext',           val: '#6060a0' },
    { key: '--btn-bg',      label: 'Button BG',         val: 'rgba(124,109,255,0.1)' },
    { key: '--btn-color',   label: 'Button text',       val: '#aaaaf8' },
    { key: '--btn-border',  label: 'Button border',     val: 'rgba(124,109,255,0.25)' },
    { key: '--btn-hover',   label: 'Button hover BG',   val: 'rgba(124,109,255,0.25)' },
    { key: '--res',         label: 'Result text',       val: '#eeeeff' },
    { key: '--res-sub',     label: 'Result subtext',    val: '#5050a0' },
  ],
  qTpl: `<h2>{title}</h2>\n<p class="sub">{description}</p>\n<div class="ch">{answers}</div>`,
  rTpl: `<div class="res">{title}</div>\n<p class="rsub">{description}</p>\n<button class="btn sec" onclick="go('start')">&#x21A9; Start over</button>`,
};

const NW = 220, NH_HEAD = 54, NBPAD = 7, ANH = 28, ADDH = 24;
const C = ['#7c6dff','#ff5f7e','#ffd166','#4dcc88','#ff9f43',
           '#a29bfe','#fd79a8','#74b9ff','#55efc4','#e17055',
           '#00cec9','#6c5ce7','#fab1a0','#fdcb6e'];

const DEFAULT = {
  "start":{"title":"Do you like coffee?","description":"Only truth.","answers":{"yes":"like-coffee","no":"dont-like-coffee"}},
  "like-coffee":{"title":"What flavour of coffee?","description":"","answers":{"black coffee":"black-coffee","latte":"latte","turek":"turek"}},
  "dont-like-coffee":{"title":"Tea or gin?","description":"","answers":{"tea":"tea","gin":"gin"}},
  "tea":{"title":"Tea time ☕","description":"","answers":{"what are you?":"otherman"}},
  "gin":{"title":"Gin time 🍸","description":"","answers":{"what are you?":"otherman"}},
  "black-coffee":{"title":"Black coffee ☕","description":"","answers":{"what are you?":"coffeman"}},
  "latte":{"title":"Latte lover ☕","description":"","answers":{"what are you?":"coffeman"}},
  "turek":{"title":"Turek devotee ☕","description":"","answers":{"what are you?":"coffeman"}},
  "coffeman":{"title":"You are a coffee person!","description":"Life runs on espresso.","answers":{}},
  "otherman":{"title":"You are not a coffee person!","description":"Tea and gin are fine too.","answers":{}}
};

window.addEventListener('DOMContentLoaded', () => {
  tree = JSON.parse(JSON.stringify(DEFAULT));
  autoLayout();
  renderAll();
  fitView(false);
  setupEvents();
});

// ══════════════════════════════════════════════
// HELPERS — skip _meta keys
// ══════════════════════════════════════════════
function nodeEntries() { return Object.entries(tree).filter(([k]) => !k.startsWith('_')); }
function nodeIds()     { return Object.keys(tree).filter(k => !k.startsWith('_')); }
function fields()      { return tree._fields || []; }

// ══════════════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════════════
function autoLayout() {
  const lvls = {}, seen = new Set();
  const ids = nodeIds();
  const root = ids.includes('start') ? 'start' : ids[0];
  if (!root) return;
  const q = [{id: root, l: 0}]; seen.add(root);
  while (q.length) {
    const {id, l} = q.shift();
    if (!lvls[l]) lvls[l] = [];
    lvls[l].push(id);
    if (tree[id]) for (const t of Object.values(tree[id].answers||{}))
      if (!seen.has(t) && tree[t]) { seen.add(t); q.push({id:t, l:l+1}); }
  }
  const CW = 290, RH = 210;
  pos = {};
  for (const [l, nids] of Object.entries(lvls)) {
    const tot = nids.length * RH, sy = 700 - tot/2;
    nids.forEach((id,i) => pos[id] = {x: 80 + +l*CW, y: sy + i*RH});
  }
  let oy = 60;
  for (const id of ids) if (!pos[id]) { pos[id] = {x:60, y:oy}; oy+=180; }
}

function nodeH(id) {
  const n = tree[id]; if (!n) return NH_HEAD + NBPAD*2 + ADDH;
  return NH_HEAD + NBPAD*2 + Object.keys(n.answers||{}).length * ANH + ADDH;
}

// RENDER ALL
// ══════════════════════════════════════════════
function renderAll() { renderCanvas(); renderJSONArea(); renderPreview(); renderNED(); }

const CT = document.getElementById('canvas-transform');
const SVG = document.getElementById('svg-layer');

function renderCanvas() {
  CT.querySelectorAll('.node').forEach(n=>n.remove());
  for (const [id, d] of nodeEntries()) CT.appendChild(mkNode(id, d, pos[id]||{x:100,y:100}));
  renderArrows();
}

function mkNode(id, d, p) {
  const isS = id==='start', isT = !Object.keys(d.answers||{}).length, isSel = id===selId;
  const el = document.createElement('div');
  el.className = 'node'+(isS?' nstart':'')+(isT?' nterm':'')+(isSel?' selected':'');
  el.dataset.id = id;
  el.style.cssText = `left:${p.x}px;top:${p.y}px`;
  const title = d.title||'';
  const ansHtml = Object.entries(d.answers||{}).map(([a,t],i)=>{
    const c=C[i%C.length];
    return `<div class="nans"><div class="npill" style="color:${c};border-color:${c}28;background:${c}10" title="${ea(a)} → ${ea(t)}">${eh(a)}</div></div>`;
  }).join('');
  el.innerHTML = `
    <div class="nhead">
      <div class="nbadge">${isS?'▶ START — ':''}${isT?'● RESULT — ':''}${id}</div>
      <div class="ntitle${!title?' empty':''}">${eh(title)||'(no title)'}</div>
    </div>
    <div class="nbody">${ansHtml}<div class="nadd" data-addans="${id}">＋ add answer</div></div>`;
  el.addEventListener('mousedown', e => {
    if (e.button!==0) return; e.stopPropagation();
    if (e.target.closest('[data-addans]')) { quickAdd(id); return; }
    selectNode(id);
    _drag={type:'node',id,sx:e.clientX,sy:e.clientY,nx:p.x,ny:p.y};
    CT.style.cursor='grabbing';
  });
  return el;
}

function renderArrows() {
  while(SVG.firstChild) SVG.removeChild(SVG.firstChild);
  const defs = svgel('defs'); SVG.appendChild(defs);
  for (const [sid,d] of nodeEntries()) {
    const sp = pos[sid]; if(!sp) continue;
    Object.entries(d.answers||{}).forEach(([ans,tid],i)=>{
      const tp = pos[tid]; if(!tp) return;
      const c = C[i%C.length], th = nodeH(tid);
      const sx=sp.x+NW, sy=sp.y+NH_HEAD+NBPAD+i*ANH+ANH/2;
      const tx=tp.x,    ty=tp.y+th/2;
      const dist=Math.abs(tx-sx), bend=Math.max(65,dist*0.42);
      const mid=`arr_${sid}_${i}`.replace(/[^a-z0-9_]/g,'_');
      const mk=svgel('marker'); mk.setAttribute('id',mid);
      ['markerWidth','markerHeight','refX','refY'].forEach((a,j)=>mk.setAttribute(a,['8','6','7','3'][j]));
      mk.setAttribute('orient','auto');
      const pl=svgel('polygon'); pl.setAttribute('points','0 0, 8 3, 0 6'); pl.setAttribute('fill',c);
      mk.appendChild(pl); defs.appendChild(mk);
      const path=svgel('path');
      path.setAttribute('d',`M${sx} ${sy} C${sx+bend} ${sy},${tx-bend} ${ty},${tx} ${ty}`);
      path.setAttribute('stroke',c); path.setAttribute('stroke-width','1.5');
      path.setAttribute('fill','none'); path.setAttribute('opacity','0.5');
      path.setAttribute('marker-end',`url(#${mid})`);
      SVG.appendChild(path);
      const lx=(sx+tx)/2, ly=Math.min(sy,ty)-7;
      const ls=ans.length>17?ans.slice(0,15)+'…':ans, lw=ls.length*5.4+10;
      const bg=svgel('rect');
      ['x','y','width','height','rx','fill'].forEach((a,j)=>bg.setAttribute(a,[lx-lw/2,ly-11,lw,14,3,'rgba(6,6,14,0.85)'][j]));
      SVG.appendChild(bg);
      const lb=svgel('text');
      lb.setAttribute('x',lx); lb.setAttribute('y',ly); lb.setAttribute('text-anchor','middle');
      lb.setAttribute('font-size','9'); lb.setAttribute('font-family','JetBrains Mono,monospace');
      lb.setAttribute('fill',c); lb.setAttribute('opacity','0.85');
      lb.textContent=ls; SVG.appendChild(lb);
    });
  }
}

function svgel(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function applyTF(){
  CT.style.transform=`translate(${tf.x}px,${tf.y}px) scale(${tf.s})`;
  document.getElementById('zlbl').textContent=Math.round(tf.s*100)+'%';
}

// ══════════════════════════════════════════════
// CANVAS EVENTS
// ══════════════════════════════════════════════
function setupEvents() {
  const wrap=document.getElementById('canvas-wrap');
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    if(!e.target.closest('.node')){
      _drag={type:'canvas',sx:e.clientX,sy:e.clientY,tx:tf.x,ty:tf.y};
      wrap.style.cursor='grabbing';
      if(selId){selId=null;document.querySelectorAll('.node.selected').forEach(n=>n.classList.remove('selected'));renderNED();}
    }
  });
  document.addEventListener('mousemove',e=>{
    if(!_drag) return;
    if(_drag.type==='node'){
      const dx=(e.clientX-_drag.sx)/tf.s, dy=(e.clientY-_drag.sy)/tf.s;
      const nx=_drag.nx+dx, ny=_drag.ny+dy;
      pos[_drag.id]={x:nx,y:ny};
      const el=CT.querySelector(`.node[data-id="${_drag.id}"]`);
      if(el){el.style.left=nx+'px';el.style.top=ny+'px';}
      renderArrows();
    } else {
      tf.x=_drag.tx+(e.clientX-_drag.sx);
      tf.y=_drag.ty+(e.clientY-_drag.sy);
      applyTF();
    }
  });
  document.addEventListener('mouseup',()=>{
    _drag=null;
    document.getElementById('canvas-wrap').style.cursor='';
    CT.style.cursor='';
  });
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.12:0.9, ns=Math.min(3,Math.max(0.18,tf.s*f));
    const r=wrap.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    tf.x=mx-(mx-tf.x)*(ns/tf.s); tf.y=my-(my-tf.y)*(ns/tf.s); tf.s=ns; applyTF();
  },{passive:false});
}

function zoomBy(f){tf.s=Math.min(3,Math.max(0.18,tf.s*f));applyTF();}

function fitView(){
  const wrap=document.getElementById('canvas-wrap'), ids=Object.keys(pos);
  if(!ids.length) return;
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  for(const id of ids){const p=pos[id],h=nodeH(id);mx=Math.min(mx,p.x);my=Math.min(my,p.y);Mx=Math.max(Mx,p.x+NW);My=Math.max(My,p.y+h);}
  const W=wrap.clientWidth,H=wrap.clientHeight,pd=70;
  tf.s=Math.min(1.5,Math.max(0.15,Math.min((W-pd*2)/(Mx-mx),(H-pd*2)/(My-my))));
  tf.x=pd-mx*tf.s; tf.y=pd-my*tf.s; applyTF();
}

// MUTATIONS
// ══════════════════════════════════════════════
function uf(id,f,v){if(!tree[id])return;tree[id][f]=v;refreshNode(id);renderJSONArea();renderPreview();}

function chAns(nid,idx,newT,newTgt){
  if(!tree[nid])return;
  const e=Object.entries(tree[nid].answers||{});
  const [ot,og]=e[idx]||['',''];
  const t=newT!==null?newT:ot, tg=newTgt!==null?newTgt:og;
  const f={}; e.forEach(([k,v],i)=>{f[i===idx?t:k]=i===idx?tg:v;});
  tree[nid].answers=f;
  refreshNode(nid); renderArrows(); renderJSONArea(); renderPreview();
}

function addAns(nid){
  if(!tree[nid])return;
  let t='new answer',n=2;
  while(tree[nid].answers[t]) t=`new answer ${n++}`;
  tree[nid].answers[t]=nodeIds()[0]||nid;
  refreshNode(nid); renderArrows(); renderNED(); renderJSONArea(); renderPreview();
}

function quickAdd(nid){addAns(nid);selectNode(nid);}

function delAns(nid,idx){
  if(!tree[nid])return;
  const e=Object.entries(tree[nid].answers||{}),f={};
  e.forEach(([k,v],i)=>{if(i!==idx)f[k]=v;});
  tree[nid].answers=f;
  refreshNode(nid); renderArrows(); renderNED(); renderJSONArea(); renderPreview();
}

function delNode(id){
  if(id==='start'){notify('⚠ Cannot delete the start node');return;}
  delete tree[id]; delete pos[id];
  for(const n of Object.values(tree))
    if(n&&n.answers) for(const [k,v] of Object.entries(n.answers)) if(v===id) delete n.answers[k];
  if(selId===id) selId=null;
  renderCanvas(); renderNED(); renderJSONArea(); renderPreview();
}

function refreshNode(id){
  const p=pos[id], old=CT.querySelector(`.node[data-id="${id}"]`);
  if(old&&p&&tree[id]) CT.replaceChild(mkNode(id,tree[id],p),old);
}

function confirmAdd(){

// JSON
// ══════════════════════════════════════════════
function treeWithMeta(){
  // Attach current template state into tree before serialising
  const out = JSON.parse(JSON.stringify(tree));
  out._template = { cssVars: tmpl.cssVars, qTpl: tmpl.qTpl, rTpl: tmpl.rTpl };
  return out;
}

function loadMeta(parsed){
  if(parsed._template){
    const t=parsed._template;
    if(Array.isArray(t.cssVars)) tmpl.cssVars=t.cssVars;
    if(typeof t.qTpl==='string') tmpl.qTpl=t.qTpl;
    if(typeof t.rTpl==='string') tmpl.rTpl=t.rTpl;
  }
}

function renderJSONArea(){
  if(_jpause)return;
  const ta=document.getElementById('json-area');
  ta.value=JSON.stringify(treeWithMeta(),null,2);
  ta.classList.remove('err');
}

document.getElementById('json-area').addEventListener('input',function(){
  if(_jpause)return;
  try{
    const p=JSON.parse(this.value); this.classList.remove('err');
    _jpause=true; tree=p; loadMeta(p);
    for(const id of nodeIds()) if(!pos[id]) pos[id]={x:100+Math.random()*400,y:100+Math.random()*400};
    renderCanvas(); renderPreview(); renderNED(); renderTplTab(); _jpause=false;
  }catch{this.classList.add('err');}
});

function applyJSON(){
  const ta=document.getElementById('json-area');
  try{
    const p=JSON.parse(ta.value); _jpause=true; tree=p; loadMeta(p);
    for(const id of nodeIds()) if(!pos[id]) pos[id]={x:100+Math.random()*400,y:100+Math.random()*400};
    renderCanvas(); renderPreview(); renderNED(); renderTplTab(); _jpause=false;
    ta.classList.remove('err'); notify('JSON applied ✓');
  }catch{ta.classList.add('err');notify('Invalid JSON');}
}

function fmtJSON(){
  const ta=document.getElementById('json-area');
  try{ta.value=JSON.stringify(JSON.parse(ta.value),null,2);ta.classList.remove('err');}
  catch{notify('Invalid JSON — cannot format');}
}

function copyJSON(){
  navigator.clipboard.writeText(JSON.stringify(treeWithMeta(),null,2)).then(()=>notify('JSON copied ✓'));
}

// Insert clicked token into the focused textarea
function insertTok(el){
  const tok = el.textContent;
  // Try to find if a template textarea is focused
  const focused = document.activeElement;
  if(focused&&(focused.id==='tpl-q'||focused.id==='tpl-r')){
    const s=focused.selectionStart, e2=focused.selectionEnd;
    focused.value=focused.value.slice(0,s)+tok+focused.value.slice(e2);
    focused.selectionStart=focused.selectionEnd=s+tok.length;
    focused.dispatchEvent(new Event('input'));
  } else {
    navigator.clipboard.writeText(tok).then(()=>notify(tok+' copied'));
  }
}

// CSS var mutations
function setCVarKey(i,v){
  if(!tmpl.cssVars[i])return;
  v=v.startsWith('--')?v:'--'+v.replace(/[^a-z0-9-]/g,'');
  tmpl.cssVars[i].key=v; renderPreview(); renderTplTab();
}
function setCVarLabel(i,v){if(tmpl.cssVars[i])tmpl.cssVars[i].label=v;}
function setCVarVal(i,v,fromColor){
  if(!tmpl.cssVars[i])return;
  tmpl.cssVars[i].val=v;
  if(!fromColor){renderPreview(); renderTplTab();}
  else {
    // Also update text input
    const el=document.getElementById(`tvar-val-${i}`);
    if(el) el.value=v;
    renderPreview();
  }
}
function addCVar(){
  tmpl.cssVars.push({key:'--new-var',label:'New variable',val:'#ffffff'});
  renderTplTab(); renderPreview();
}
function delCVar(i){tmpl.cssVars.splice(i,1);renderTplTab();renderPreview();}

// Custom field mutations
function addField(){
  if(!tree._fields) tree._fields=[];
  tree._fields.push({id:'field-'+Math.random().toString(36).slice(2,5),label:'New Field'});
  renderTplTab(); renderNED(); renderJSONArea(); renderPreview();
}
function setFieldId(i,v){
  const f=fields(); if(!f[i])return;
  v=v.toLowerCase().replace(/[^a-z0-9-]/g,'-');
  f[i].id=v; renderTplTab(); renderNED(); renderJSONArea(); renderPreview();
}
function setFieldLabel(i,v){
  const f=fields(); if(!f[i])return;
  f[i].label=v; renderTplTab(); renderNED(); renderJSONArea();
}
function delField(i){
  const f=fields(); if(!f[i])return;
  const fid=f[i].id; f.splice(i,1);
  if(!f.length) delete tree._fields;
  renderTplTab(); renderNED(); renderJSONArea(); renderPreview();
}

// ══════════════════════════════════════════════
// HTML GENERATION
// ══════════════════════════════════════════════
function genHTML(){
  const flds=fields();
  const entries=nodeEntries();
  const firstId=(tree['start']?'start':entries[0]?.[0])||'start';

  // :root CSS vars block
  const rootVars = tmpl.cssVars.map(r=>`  ${r.key}: ${r.val};`).join('\n');

  // Slides
  const slides=entries.map(([id,nd])=>{
    const ansl=Object.entries(nd.answers||{}), isTerm=!ansl.length;
    const answersHTML=ansl.map(([a,t])=>`<button class="btn" onclick="go('${t}')">${eh(a)}</button>`).join('');
    let tpl=isTerm?tmpl.rTpl:tmpl.qTpl;
    // Replace built-in tokens
    tpl=tpl.replace(/\{title\}/g,eh(nd.title||id))
           .replace(/\{description\}/g,eh(nd.description||''));
    if(!isTerm) tpl=tpl.replace(/\{answers\}/g,answersHTML);
    // Replace custom field tokens
    for(const f of flds) tpl=tpl.replace(new RegExp(`\\{${f.id}\\}`,'g'),eh(nd[f.id]||''));
    return `<div class="slide" id="slide-${id}">\n${tpl}\n</div>`;
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Tree</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
${rootVars}
}
body{background:var(--bg,#09090f);color:var(--text,#d8d8f0);font-family:var(--font,'Segoe UI',system-ui,sans-serif);height:100vh;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;padding:40px;text-align:center;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;transform:translateY(10px)}
.slide.active{opacity:1;pointer-events:auto;transform:translateY(0)}
h2{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;max-width:560px;line-height:1.3;color:var(--h2,#eeeeff)}
.sub{color:var(--sub,#6060a0);max-width:460px;line-height:1.7;font-size:.95rem;margin:0}
.ch{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:600px;margin-top:6px}
.btn{padding:13px 26px;background:var(--btn-bg,rgba(124,109,255,.1));color:var(--btn-color,#aaaaf8);border:1px solid var(--btn-border,rgba(124,109,255,.25));border-radius:10px;font-size:.95rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{background:var(--btn-hover,rgba(124,109,255,.25));color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn.sec{background:rgba(255,255,255,.04);color:#505090;border-color:rgba(255,255,255,.08);font-size:.82rem}
.btn.sec:hover{color:#9090d0;background:rgba(255,255,255,.08);transform:none;box-shadow:none}
.res{font-size:clamp(1.5rem,5vw,2.6rem);font-weight:700;color:var(--res,#eeeeff);max-width:540px;line-height:1.25}
.rsub{color:var(--res-sub,#5050a0);font-size:.95rem;max-width:440px;line-height:1.7;margin:0}
</style>
</head>
<body>
${slides}
<script>
function go(id){
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById('slide-'+id);
  if(el)el.classList.add('active');
}
go('${firstId}');
<\/script>
</body>
</html>`;
}

function renderPreview(){document.getElementById('preview-frame').srcdoc=genHTML();}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.dataset.tab===tab));
  if(tab==='json') renderJSONArea();
  if(tab==='template') renderTplTab();
}

// ══════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════
function exportJSON(){dl(new Blob([JSON.stringify(treeWithMeta(),null,2)],{type:'application/json'}),'decision-tree.json');notify('JSON exported ✓');}
function exportHTML(){dl(new Blob([genHTML()],{type:'text/html'}),'decision-tree.html');notify('HTML exported ✓');}
function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        tree=parsed; loadMeta(parsed);
        pos={}; autoLayout(); renderAll(); renderTplTab(); fitView();
        notify('JSON imported ✓');
      }catch{notify('Invalid JSON file');}
    };
    r.readAsText(f);
  };inp.click();
}

// ══════════════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════════════
function resetLayout(){autoLayout();renderCanvas();fitView();notify('Layout reset ✓');}

// ══════════════════════════════════════════════
// NOTIF
// ══════════════════════════════════════════════
let _nt;
function notify(m){const el=document.getElementById('notif');el.textContent=m;el.classList.add('show');clearTimeout(_nt);_nt=setTimeout(()=>el.classList.remove('show'),2500);}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
</script>
</body>
</html>
